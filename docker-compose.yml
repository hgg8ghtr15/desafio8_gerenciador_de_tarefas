version: '3.8'

services:
  app:
    build: .
    container_name: node_app
    ports:
      - "3333:3333" # Mapeia porta 3000 da sua máquina para a 3000 do container
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3333
    command: npm run dev
    depends_on:
      - postgres

  postgres:
    image: "bitnami/postgresql:latest"
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: api-gerenciamento-tarefa
